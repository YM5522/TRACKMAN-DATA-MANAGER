<!DOCTYPE html>
<html lang="ja" style="background:#0a0f1e !important;background-color:#0a0f1e !important;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrackMan">
<title>TrackMan Data Manager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { color-scheme: dark; background-color: #0a0f1e; }
html {
  background: #0a0f1e !important;
  background-color: #0a0f1e !important;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: #0a0f1e !important;
  background-color: #0a0f1e !important;
  color: #e8edf5;
  font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  -webkit-text-size-adjust: 100%;
}
body::before {
  content: '';
  display: block;
  position: fixed;
  top: -9999px; left: -9999px;
  right: -9999px; bottom: -9999px;
  background: #0a0f1e;
  z-index: -9999;
  pointer-events: none;
}

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 60px;
  background: #0d1424;
  border-bottom: 1px solid #1e2a3a;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #00d4aa, #0066ff);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.logo-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
.logo-sub { font-size: 9px; color: #00d4aa; letter-spacing: 0.12em; }
.nav-right { display: flex; gap: 8px; }
.btn { border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.18s; }
.btn-ghost { background: transparent; color: rgba(255,255,255,0.5); padding: 8px 14px; font-size: 13px; }
.btn-ghost.active { background: rgba(255,255,255,0.1); color: #fff; }
.btn-primary { background: linear-gradient(135deg, #00d4aa, #0066ff); color: #fff; padding: 9px 18px; font-size: 13px; }
.btn-outline { background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.4); color: #00d4aa; padding: 9px 16px; font-size: 13px; }
.btn-muted { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); padding: 9px 16px; font-size: 13px; }
.btn-wide { width: 100%; padding: 15px; font-size: 15px; border-radius: 12px; }
.btn-back { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 14px; font-family: inherit; padding: 0; margin-bottom: 24px; display: flex; align-items: center; gap: 6px; }

/* CONTAINER / VIEWS */
.container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
.view { display: none; }
.view.active { display: block; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 32px; }
.stat-card { background: #111827; border: 1px solid #1e2a3a; border-radius: 14px; padding: 20px; position: relative; overflow: hidden; }
.stat-icon { position: absolute; top: 14px; right: 14px; font-size: 32px; opacity: 0.12; }
.stat-label { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
.stat-value { font-size: 36px; font-weight: 800; }

/* SECTION HEADER */
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-title { font-size: 17px; font-weight: 700; color: #fff; }

/* PLAYER CARDS */
.players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 14px; }
.player-card { background: #111827; border: 1px solid #1e2a3a; border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.18s; }
.player-card:hover { background: #162032; border-color: rgba(0,212,170,0.35); transform: translateY(-2px); }
.player-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.avatar { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg,#0066ff22,#00d4aa22); border: 1px solid rgba(0,212,170,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #00d4aa; flex-shrink: 0; }
.player-name { font-size: 15px; font-weight: 700; color: #fff; }
.player-count { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.latest-box { background: rgba(0,212,170,0.06); border: 1px solid rgba(0,212,170,0.14); border-radius: 9px; padding: 10px 12px; }
.latest-lbl { font-size: 10px; color: rgba(255,255,255,0.38); margin-bottom: 3px; }
.latest-date { font-size: 12px; color: #00d4aa; }
.no-data { font-size: 12px; color: rgba(255,255,255,0.22); text-align: center; padding: 10px 0; }

/* ADD PLAYER FORM */
#add-player-form { display: none; background: #111827; border: 1px solid #1e2a3a; border-radius: 12px; padding: 16px; margin-bottom: 20px; gap: 10px; align-items: center; }
#add-player-form.show { display: flex; }
#new-player-name { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #1e2a3a; background: #0a0f1e; color: #fff; font-size: 14px; outline: none; font-family: inherit; }
#new-player-name:focus { border-color: rgba(0,212,170,0.5); }

/* RECENT LIST */
#recent-section { margin-top: 36px; }
.recent-item { background: #111827; border: 1px solid #1e2a3a; border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.18s; margin-bottom: 10px; }
.recent-item:hover { background: #162032; }
.rec-avatar { width: 38px; height: 38px; border-radius: 10px; background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.2); display: flex; align-items: center; justify-content: center; font-size: 16px; color: #00d4aa; flex-shrink: 0; }

/* PLAYER DETAIL */
.pd-header { display: flex; align-items: center; gap: 18px; margin-bottom: 28px; flex-wrap: wrap; }
.pd-avatar { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg,#0066ff33,#00d4aa33); border: 2px solid rgba(0,212,170,0.4); display: flex; align-items: center; justify-content: center; font-size: 28px; color: #00d4aa; font-weight: 700; }
.pd-name { font-size: 24px; font-weight: 800; color: #fff; }
.pd-sub { color: rgba(255,255,255,0.4); margin-top: 3px; font-size: 13px; }
.records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 14px; }
.rec-card { background: #111827; border: 1px solid #1e2a3a; border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.18s; }
.rec-card:hover { border-color: rgba(0,212,170,0.3); transform: translateY(-2px); }
.rec-thumb { height: 160px; overflow: hidden; background: #0d1424; }
.rec-thumb img { width: 100%; height: 100%; object-fit: cover; }
.rec-info { padding: 14px 16px; }
.rec-date { font-size: 12px; color: #00d4aa; font-weight: 600; margin-bottom: 3px; }
.rec-note { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }

/* RECORD DETAIL */
.rd-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media(min-width:600px){ .rd-grid { grid-template-columns: 1fr 320px; } }
.rd-img-box { background: #0d1424; border: 1px solid #1e2a3a; border-radius: 14px; overflow: hidden; }
.rd-img-box img { width: 100%; display: block; }
.rd-panel { background: #111827; border: 1px solid #1e2a3a; border-radius: 14px; padding: 24px; }
.rd-player-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.rd-av { width: 46px; height: 46px; border-radius: 12px; background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.25); display: flex; align-items: center; justify-content: center; font-size: 20px; color: #00d4aa; }
.rd-name { font-size: 16px; font-weight: 700; color: #fff; }
.rd-sub { font-size: 11px; color: rgba(255,255,255,0.38); }
.rd-row { margin-bottom: 18px; }
.rd-lbl { font-size: 10px; color: rgba(255,255,255,0.32); letter-spacing: 0.1em; margin-bottom: 5px; text-transform: uppercase; }
.rd-val { font-size: 15px; color: #00d4aa; font-weight: 600; }
.rd-val-sm { font-size: 13px; color: rgba(255,255,255,0.55); }
.rd-note-box { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.7; background: rgba(255,255,255,0.04); border-radius: 9px; padding: 12px; }

/* UPLOAD */
.upload-wrap { max-width: 560px; margin: 0 auto; }

/* STEPS */
.steps { display: flex; align-items: flex-start; justify-content: center; margin-bottom: 36px; }
.step-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.step-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; background: #1e2a3a; color: rgba(255,255,255,0.3); transition: all 0.25s; }
.step-circle.on { background: linear-gradient(135deg,#00d4aa,#0066ff); color: #fff; }
.step-lbl { font-size: 10px; color: rgba(255,255,255,0.3); }
.step-lbl.on { color: #00d4aa; }
.step-line { width: 60px; height: 2px; background: #1e2a3a; margin: 17px 6px 0; transition: all 0.25s; flex-shrink: 0; }
.step-line.on { background: linear-gradient(90deg,#00d4aa,#0066ff); }

.upload-panel { display: none; }
.upload-panel.active { display: block; }

/* DROP ZONE */
#drop-zone { border: 2px dashed rgba(0,212,170,0.3); border-radius: 18px; padding: 60px 30px; text-align: center; cursor: pointer; background: rgba(0,212,170,0.03); transition: all 0.2s; }
#drop-zone:hover, #drop-zone.over { background: rgba(0,212,170,0.07); border-color: rgba(0,212,170,0.6); }
#drop-zone .dz-icon { font-size: 52px; margin-bottom: 16px; }
#drop-zone .dz-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 6px; }
#drop-zone .dz-sub { font-size: 13px; color: rgba(255,255,255,0.38); }

/* PLAYER SELECT */
.psel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.psel-item { padding: 14px 16px; border: 2px solid #1e2a3a; border-radius: 11px; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #0d1424; transition: all 0.18s; }
.psel-item:hover { border-color: rgba(0,212,170,0.3); }
.psel-item.sel { border-color: #00d4aa; background: rgba(0,212,170,0.07); }
.psel-av { width: 36px; height: 36px; border-radius: 10px; background: #1e2a3a; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0; }
.psel-item.sel .psel-av { background: linear-gradient(135deg,#00d4aa,#0066ff); }
.psel-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); }
.psel-item.sel .psel-name { color: #00d4aa; }
.preview-thumb { border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #1e2a3a; }
.preview-thumb img { width: 100%; max-height: 260px; object-fit: contain; display: block; background: #0d1424; }

/* CONFIRM */
.confirm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
.confirm-img-box { border-radius: 11px; overflow: hidden; border: 1px solid #1e2a3a; }
.confirm-img-box img { width: 100%; display: block; }
.confirm-info { background: #0d1424; border: 1px solid #1e2a3a; border-radius: 11px; padding: 18px; }
.ci-lbl { font-size: 11px; color: rgba(255,255,255,0.38); margin-bottom: 4px; }
.ci-val { font-size: 15px; font-weight: 700; color: #00d4aa; margin-bottom: 14px; }
input[type=datetime-local] { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #1e2a3a; background: #0a0f1e; color: #fff; font-size: 13px; outline: none; color-scheme: dark; font-family: inherit; }
input[type=datetime-local]:focus { border-color: rgba(0,212,170,0.5); }
textarea { width: 100%; padding: 12px 14px; border-radius: 11px; border: 1px solid #1e2a3a; background: #0d1424; color: #fff; font-size: 13px; outline: none; resize: vertical; line-height: 1.6; font-family: inherit; margin-bottom: 20px; }
textarea:focus { border-color: rgba(0,212,170,0.5); }
.note-lbl { font-size: 12px; color: rgba(255,255,255,0.42); margin-bottom: 7px; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
.btn-row .btn-primary { flex: 2; }

/* EMPTY */
.empty { text-align: center; padding: 64px 0; color: rgba(255,255,255,0.22); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }

/* TOAST */
#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px); background: #00d4aa; color: #0a0f1e; padding: 12px 24px; border-radius: 10px; font-weight: 700; font-size: 13px; transition: transform 0.28s; z-index: 9999; pointer-events: none; white-space: nowrap; }
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.err { background: #ff4444; color: #fff; }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-icon">⛳</div>
    <div>
      <div class="logo-title">TRACKMAN</div>
      <div class="logo-sub">DATA MANAGER</div>
    </div>
  </div>
  <div class="nav-right">
    <button class="btn btn-ghost active" onclick="goDashboard()">ダッシュボード</button>
    <button class="btn btn-primary" onclick="goUpload()">＋ 新規登録</button>
  </div>
</nav>

<div class="container">

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">👤</div><div class="stat-label">登録選手数</div><div class="stat-value" id="s-players" style="color:#0066ff">0</div></div>
      <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-label">総データ数</div><div class="stat-value" id="s-records" style="color:#00d4aa">0</div></div>
      <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-label">今月の登録</div><div class="stat-value" id="s-month" style="color:#ff6b35">0</div></div>
    </div>

    <div class="sec-header">
      <div class="sec-title">選手一覧</div>
      <button class="btn btn-outline" onclick="toggleAddForm()">＋ 選手追加</button>
    </div>

    <div id="add-player-form">
      <input id="new-player-name" type="text" placeholder="選手名を入力..." onkeydown="if(event.key==='Enter')doAddPlayer()">
      <button class="btn btn-primary" onclick="doAddPlayer()">追加</button>
      <button class="btn btn-muted" onclick="toggleAddForm()">キャンセル</button>
    </div>

    <div class="players-grid" id="players-grid"></div>

    <div id="recent-section" style="display:none">
      <div class="sec-title" style="margin:32px 0 14px">最近の登録</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- PLAYER DETAIL -->
  <div class="view" id="view-player">
    <button class="btn-back" onclick="goDashboard()">← ダッシュボードへ戻る</button>
    <div class="pd-header">
      <div class="pd-avatar" id="pd-avatar"></div>
      <div>
        <div class="pd-name" id="pd-name"></div>
        <div class="pd-sub" id="pd-sub"></div>
      </div>
      <button class="btn btn-primary" style="margin-left:auto" onclick="goUploadForPlayer()">＋ データ追加</button>
    </div>
    <div class="records-grid" id="records-grid"></div>
  </div>

  <!-- RECORD DETAIL -->
  <div class="view" id="view-record">
    <button class="btn-back" onclick="goBackFromRecord()">← 戻る</button>
    <div class="rd-grid">
      <div class="rd-img-box"><img id="rd-img" src="" alt=""></div>
      <div class="rd-panel">
        <div class="rd-player-row">
          <div class="rd-av" id="rd-av"></div>
          <div><div class="rd-name" id="rd-name"></div><div class="rd-sub">プロゴルファー</div></div>
        </div>
        <div class="rd-row"><div class="rd-lbl">撮影日時</div><div class="rd-val" id="rd-date"></div></div>
        <div class="rd-row"><div class="rd-lbl">登録日時</div><div class="rd-val-sm" id="rd-created"></div></div>
        <div class="rd-row" id="rd-note-row"><div class="rd-lbl">メモ</div><div class="rd-note-box" id="rd-note"></div></div>
      </div>
    </div>
    <!-- AI DATA -->
    <div id="rd-ai-box" style="display:none;margin-top:20px;background:#111827;border:1px solid #1e2a3a;border-radius:14px;padding:20px;">
      <div style="font-size:13px;color:#00d4aa;font-weight:700;margin-bottom:14px;">🤖 TrackManデータ</div>
      <div id="rd-ai-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;"></div>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="view" id="view-upload">
    <div class="upload-wrap">
      <div class="steps">
        <div class="step-item"><div class="step-circle on" id="sc1">1</div><div class="step-lbl on" id="sl1">画像選択</div></div>
        <div class="step-line" id="sline1"></div>
        <div class="step-item"><div class="step-circle" id="sc2">2</div><div class="step-lbl" id="sl2">選手選択</div></div>
        <div class="step-line" id="sline2"></div>
        <div class="step-item"><div class="step-circle" id="sc3">3</div><div class="step-lbl" id="sl3">確認・登録</div></div>
      </div>

      <!-- Step 1 -->
      <div class="upload-panel active" id="upanel1">
        <div id="drop-zone"
          onclick="document.getElementById('file-in').click()"
          ondrop="onDrop(event)"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)">
          <div class="dz-icon">📸</div>
          <div class="dz-title">TrackManのスクリーンショットを選択</div>
          <div class="dz-sub">タップして選択 / ドラッグ＆ドロップ</div>
        </div>
        <input type="file" id="file-in" accept="image/*" style="display:none" onchange="onFileChange(event)">
      </div>

      <!-- Step 2 -->
      <div class="upload-panel" id="upanel2">
        <div class="preview-thumb"><img id="prev-img" src="" alt=""></div>
        <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:14px;">選手を選んでください</div>
        <div class="psel-grid" id="psel-grid"></div>
        <button class="btn btn-primary btn-wide" onclick="goStep3()">次へ → 日時・メモを入力</button>
      </div>

      <!-- Step 3 -->
      <div class="upload-panel" id="upanel3">
        <div class="confirm-grid">
          <div class="confirm-img-box"><img id="conf-img" src="" alt=""></div>
          <div class="confirm-info">
            <div class="ci-lbl">選手</div>
            <div class="ci-val" id="conf-player"></div>
            <div class="ci-lbl">撮影日時</div>
            <input type="datetime-local" id="conf-dt">
          </div>
        </div>

        <!-- AI解析結果 -->
        <div id="ai-result-box" style="display:none;background:#0d1424;border:1px solid #1e2a3a;border-radius:12px;padding:16px;margin-bottom:16px;">
          <div style="font-size:12px;color:#00d4aa;font-weight:700;margin-bottom:12px;">🤖 AI解析結果</div>
          <div id="ai-data-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
        </div>
        <div id="ai-loading" style="display:none;text-align:center;padding:20px;color:rgba(255,255,255,0.5);font-size:13px;">
          🤖 TrackManデータを解析中...
        </div>
        <div id="ai-error" style="display:none;background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.3);border-radius:9px;padding:12px;margin-bottom:12px;font-size:12px;color:rgba(255,150,150,0.9);"></div>

        <div class="note-lbl">メモ（任意）</div>
        <textarea id="conf-note" rows="3" placeholder="例：ドライバー練習、風速10m、コース名など..."></textarea>
        <div class="btn-row">
          <button class="btn btn-muted" onclick="goStep2()">← 戻る</button>
          <button class="btn btn-primary" id="save-btn" onclick="doSave()">登録する</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ===== DATA =====
var GEMINI_API_KEY = 'AIzaSyDU7A5cW_MasZuZ1_brUz6FGc97z0V6__o';
var players = [];
var records = [];
var nextId = 100;

// upload state
var upFile = null;
var upUrl = null;
var upPlayerId = null;
var currentPlayerId = null;
var recordFrom = 'dashboard';

// ===== UTILS =====
function fmt(d) {
  if (!d) return '';
  return new Intl.DateTimeFormat('ja-JP', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit'
  }).format(d);
}
function nowLocal() {
  var d = new Date();
  var pad = function(n){ return String(n).padStart(2,'0'); };
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}
function pById(id) {
  for (var i=0; i<players.length; i++) { if (players[i].id == id) return players[i]; }
  return null;
}
function pRecords(pid) {
  return records.filter(function(r){ return r.playerId == pid; });
}
function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isErr ? 'err show' : 'show';
  setTimeout(function(){ t.className = isErr ? 'err' : ''; }, 2800);
}

// ===== VIEW =====
function showView(name) {
  var views = document.querySelectorAll('.view');
  for (var i=0; i<views.length; i++) views[i].classList.remove('active');
  document.getElementById('view-'+name).classList.add('active');
}
function goDashboard() {
  showView('dashboard');
  renderDashboard();
}
function goBackFromRecord() {
  if (recordFrom === 'player' && currentPlayerId) showPlayer(currentPlayerId);
  else goDashboard();
}

// ===== DASHBOARD =====
function renderDashboard() {
  document.getElementById('s-players').textContent = players.length;
  document.getElementById('s-records').textContent = records.length;
  var m = new Date().getMonth();
  var monthCount = records.filter(function(r){ return r.createdAt.getMonth() === m; }).length;
  document.getElementById('s-month').textContent = monthCount;

  var grid = document.getElementById('players-grid');
  grid.innerHTML = '';
  players.forEach(function(p) {
    var recs = pRecords(p.id);
    var latest = recs[0];
    var card = document.createElement('div');
    card.className = 'player-card';
    card.onclick = null;
    var latestHtml = latest
      ? '<div class="latest-box"><div class="latest-lbl">最新データ</div><div class="latest-date">'+fmt(latest.dateTime)+'</div></div>'
      : '<div class="no-data">データなし</div>';
    card.innerHTML = '<div class="player-header">'
      +'<div onclick="showPlayer('+p.id+')" style="display:flex;align-items:center;gap:14px;flex:1;cursor:pointer;-webkit-tap-highlight-color:rgba(0,212,170,0.1)">'
      +'<div class="avatar">'+p.avatar+'</div>'
      +'<div><div class="player-name">'+p.name+'</div><div class="player-count">'+recs.length+' 件のデータ</div></div>'
      +'</div>'
      +'<button onclick="event.stopPropagation();showDeleteConfirm(this,'+p.id+')" style="background:rgba(255,60,60,0.12);border:1px solid rgba(255,60,60,0.25);color:rgba(255,100,100,0.8);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0;">削除</button>'
      +'</div>'
      +'<div onclick="showPlayer('+p.id+')" style="cursor:pointer">'+latestHtml+'</div>'
      +'<div class="delete-confirm" id="dc-'+p.id+'" style="display:none;background:rgba(255,40,40,0.1);border:1px solid rgba(255,60,60,0.3);border-radius:9px;padding:12px;margin-top:10px;text-align:center;">'
      +'<div style="font-size:12px;color:rgba(255,180,180,0.9);margin-bottom:10px;">⚠️ 本当に削除しますか？<br><span style="font-size:11px;opacity:0.7">この選手のデータも全て削除されます</span></div>'
      +'<div style="display:flex;gap:8px;">'
      +'<button onclick="event.stopPropagation();hideDeleteConfirm('+p.id+')" style="flex:1;padding:8px;border-radius:7px;border:1px solid #1e2a3a;background:#1e2a3a;color:#fff;font-size:12px;cursor:pointer;">キャンセル</button>'
      +'<button onclick="event.stopPropagation();deletePlayer('+p.id+')" style="flex:1;padding:8px;border-radius:7px;border:none;background:#ff3c3c;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">削除する</button>'
      +'</div></div>';
    grid.appendChild(card);
  });

  var sec = document.getElementById('recent-section');
  var list = document.getElementById('recent-list');
  if (records.length === 0) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  list.innerHTML = '';
  var recent = records.slice(0, 5);
  recent.forEach(function(rec) {
    var item = document.createElement('div');
    item.className = 'recent-item';
    item.onclick = function(){ recordFrom='dashboard'; showRecord(rec.id); };
    item.innerHTML = '<div class="rec-avatar">'+rec.playerAvatar+'</div>'
      +'<div><div style="font-size:13px;font-weight:600;color:#fff">'+rec.playerName+'</div>'
      +'<div style="font-size:11px;color:rgba(255,255,255,0.4)">'+fmt(rec.dateTime)+'</div></div>'
      +(rec.note ? '<div style="font-size:11px;color:rgba(255,255,255,0.38);margin-left:auto;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+rec.note+'</div>' : '')
      +'<div style="font-size:18px">📸</div>';
    list.appendChild(item);
  });
}

function showDeleteConfirm(btn, pid) {
  var dc = document.getElementById('dc-'+pid);
  if (dc) dc.style.display = 'block';
}
function hideDeleteConfirm(pid) {
  var dc = document.getElementById('dc-'+pid);
  if (dc) dc.style.display = 'none';
}
function deletePlayer(pid) {
  var p = pById(pid);
  if (!p) return;
  players = players.filter(function(pl){ return pl.id != pid; });
  records = records.filter(function(r){ return r.playerId != pid; });
  renderDashboard();
  toast('🗑️ ' + p.name + ' を削除しました');
}

// ===== ADD PLAYER =====
function toggleAddForm() {
  var form = document.getElementById('add-player-form');
  if (form.classList.contains('show')) {
    form.classList.remove('show');
  } else {
    form.classList.add('show');
    document.getElementById('new-player-name').focus();
  }
}
function doAddPlayer() {
  var input = document.getElementById('new-player-name');
  var name = input.value.trim();
  if (!name) { toast('名前を入力してください', true); return; }
  players.push({ id: ++nextId, name: name, avatar: name[0] });
  input.value = '';
  document.getElementById('add-player-form').classList.remove('show');
  renderDashboard();
  toast('✅ '+name+' を追加しました');
}

// ===== PLAYER DETAIL =====
function showPlayer(pid) {
  currentPlayerId = pid;
  var p = pById(pid);
  if (!p) return;
  document.getElementById('pd-avatar').textContent = p.avatar;
  document.getElementById('pd-name').textContent = p.name;
  var recs = pRecords(pid);
  document.getElementById('pd-sub').textContent = recs.length + ' 件のTrackManデータ';
  var grid = document.getElementById('records-grid');
  grid.innerHTML = '';
  if (recs.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>データがまだありません</div>';
  } else {
    recs.forEach(function(rec) {
      var card = document.createElement('div');
      card.className = 'rec-card';
      card.onclick = function(){ recordFrom='player'; showRecord(rec.id); };
      card.innerHTML = '<div class="rec-thumb"><img src="'+rec.imageUrl+'" alt="" loading="lazy"></div>'
        +'<div class="rec-info"><div class="rec-date">'+fmt(rec.dateTime)+'</div>'
        +(rec.note ? '<div class="rec-note">'+rec.note+'</div>' : '')+'</div>';
      grid.appendChild(card);
    });
  }
  showView('player');
}

// ===== RECORD DETAIL =====
function showRecord(rid) {
  var rec = null;
  for (var i=0; i<records.length; i++) { if (records[i].id == rid) { rec = records[i]; break; } }
  if (!rec) return;
  document.getElementById('rd-img').src = rec.imageUrl;
  document.getElementById('rd-av').textContent = rec.playerAvatar;
  document.getElementById('rd-name').textContent = rec.playerName;
  document.getElementById('rd-date').textContent = fmt(rec.dateTime);
  document.getElementById('rd-created').textContent = fmt(rec.createdAt);
  var noteRow = document.getElementById('rd-note-row');
  if (rec.note) {
    noteRow.style.display = 'block';
    document.getElementById('rd-note').textContent = rec.note;
  } else {
    noteRow.style.display = 'none';
  }
  var aiBox = document.getElementById('rd-ai-box');
  var aiGrid = document.getElementById('rd-ai-grid');
  aiGrid.innerHTML = '';
  if (rec.aiData && Object.keys(rec.aiData).length > 0) {
    var hasAny = false;
    Object.keys(rec.aiData).forEach(function(key) {
      if (rec.aiData[key] === null || rec.aiData[key] === undefined) return;
      hasAny = true;
      var item = document.createElement('div');
      item.style.cssText = 'background:#0d1424;border:1px solid #1e2a3a;border-radius:9px;padding:12px;';
      item.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,0.38);margin-bottom:4px;">'+(AI_LABELS[key]||key)+'</div>'
        +'<div style="font-size:18px;font-weight:700;color:#00d4aa;">'+rec.aiData[key]+'</div>';
      aiGrid.appendChild(item);
    });
    aiBox.style.display = hasAny ? 'block' : 'none';
  } else {
    aiBox.style.display = 'none';
  }
  showView('record');
}

// ===== UPLOAD =====
function setStep(n) {
  for (var i=1; i<=3; i++) {
    document.getElementById('upanel'+i).className = 'upload-panel' + (i===n ? ' active' : '');
    document.getElementById('sc'+i).className = 'step-circle' + (i<=n ? ' on' : '');
    document.getElementById('sl'+i).className = 'step-lbl' + (i<=n ? ' on' : '');
  }
  document.getElementById('sline1').className = 'step-line' + (n>1 ? ' on' : '');
  document.getElementById('sline2').className = 'step-line' + (n>2 ? ' on' : '');
}
function goUpload() {
  upFile = null; upUrl = null; upPlayerId = null;
  document.getElementById('conf-dt').value = nowLocal();
  document.getElementById('conf-note').value = '';
  setStep(1);
  showView('upload');
}
function goUploadForPlayer() {
  upPlayerId = currentPlayerId;
  upFile = null; upUrl = null;
  document.getElementById('conf-dt').value = nowLocal();
  document.getElementById('conf-note').value = '';
  setStep(1);
  showView('upload');
}
function goStep2() {
  setStep(2);
  renderPsel();
}
function goStep3() {
  if (!upPlayerId) { toast('選手を選んでください', true); return; }
  var p = pById(upPlayerId);
  document.getElementById('conf-img').src = upUrl;
  document.getElementById('conf-player').textContent = p.name;
  document.getElementById('ai-result-box').style.display = 'none';
  document.getElementById('ai-error').style.display = 'none';
  setStep(3);
  analyzeWithGemini();
}

var aiData = {};

function analyzeWithGemini() {
  if (!upFile) return;
  document.getElementById('ai-loading').style.display = 'block';
  document.getElementById('ai-result-box').style.display = 'none';
  document.getElementById('ai-error').style.display = 'none';

  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(',')[1];
    var mimeType = upFile.type || 'image/jpeg';

    var prompt = 'この画像はTrackManゴルフ計測器のスクリーンショットです。画面に表示されているすべての数値データを読み取り、以下のJSON形式のみで返してください。値がない項目はnullにしてください。単位は含めず数値のみ。\n\n{"club_speed":null,"ball_speed":null,"smash_factor":null,"launch_angle":null,"spin_rate":null,"spin_axis":null,"carry":null,"total":null,"height":null,"attack_angle":null,"club_path":null,"face_angle":null,"dynamic_loft":null,"side":null}';

    fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_API_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: mimeType, data: base64 } }
          ]
        }]
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      document.getElementById('ai-loading').style.display = 'none';
      // エラーレスポンスのチェック
      if (data.error) {
        throw new Error(data.error.message || 'APIエラー');
      }
      var text = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;
      if (!text) {
        // finishReasonを確認
        var reason = data.candidates && data.candidates[0] && data.candidates[0].finishReason;
        throw new Error('解析結果なし (reason: ' + (reason||'unknown') + ') / ' + JSON.stringify(data).slice(0,200));
      }
      var match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('JSON抽出失敗: ' + text.slice(0,100));
      aiData = JSON.parse(match[0]);
      renderAiData();
    })
    .catch(function(err) {
      document.getElementById('ai-loading').style.display = 'none';
      document.getElementById('ai-error').style.display = 'block';
      document.getElementById('ai-error').textContent = '⚠️ 解析エラー: ' + err.message;
      aiData = {};
    });
  };
  reader.readAsDataURL(upFile);
}

var AI_LABELS = {
  club_speed: 'クラブ速度 (mph)',
  ball_speed: 'ボール速度 (mph)',
  smash_factor: 'スマッシュファクター',
  launch_angle: '打ち出し角 (°)',
  spin_rate: 'スピン量 (rpm)',
  spin_axis: 'スピン軸 (°)',
  carry: 'キャリー (yds)',
  total: 'トータル (yds)',
  height: '最高到達点 (yds)',
  attack_angle: 'アタック角 (°)',
  club_path: 'クラブパス (°)',
  face_angle: 'フェイス角 (°)',
  dynamic_loft: 'ダイナミックロフト (°)',
  side: 'サイド (yds)'
};

function renderAiData() {
  var grid = document.getElementById('ai-data-grid');
  grid.innerHTML = '';
  var hasData = false;
  Object.keys(aiData).forEach(function(key) {
    if (aiData[key] === null || aiData[key] === undefined) return;
    hasData = true;
    var item = document.createElement('div');
    item.style.cssText = 'background:#111827;border:1px solid #1e2a3a;border-radius:8px;padding:10px 12px;';
    item.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,0.38);margin-bottom:3px;">'+(AI_LABELS[key]||key)+'</div>'
      +'<div style="font-size:16px;font-weight:700;color:#00d4aa;">'+aiData[key]+'</div>';
    grid.appendChild(item);
  });
  if (hasData) {
    document.getElementById('ai-result-box').style.display = 'block';
  } else {
    document.getElementById('ai-error').style.display = 'block';
    document.getElementById('ai-error').textContent = '⚠️ 数値データが読み取れませんでした。TrackManの画面が写っているか確認してください。';
  }
}
function renderPsel() {
  var grid = document.getElementById('psel-grid');
  grid.innerHTML = '';
  players.forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'psel-item' + (upPlayerId == p.id ? ' sel' : '');
    div.onclick = function(){ upPlayerId = p.id; renderPsel(); };
    div.innerHTML = '<div class="psel-av">'+p.avatar+'</div><span class="psel-name">'+p.name+'</span>';
    grid.appendChild(div);
  });
}
function onFileChange(e) {
  var file = e.target.files[0];
  if (!file) return;
  upFile = file;
  upUrl = URL.createObjectURL(file);
  document.getElementById('prev-img').src = upUrl;
  goStep2();
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  var file = e.dataTransfer.files[0];
  if (!file) return;
  upFile = file;
  upUrl = URL.createObjectURL(file);
  document.getElementById('prev-img').src = upUrl;
  goStep2();
}
function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }
function onDragLeave() { document.getElementById('drop-zone').classList.remove('over'); }
function doSave() {
  var p = pById(upPlayerId);
  if (!p) { toast('選手が選択されていません', true); return; }
  var dtVal = document.getElementById('conf-dt').value;
  var note = document.getElementById('conf-note').value.trim();
  var rec = {
    id: ++nextId,
    playerId: upPlayerId,
    playerName: p.name,
    playerAvatar: p.avatar,
    imageUrl: upUrl,
    dateTime: dtVal ? new Date(dtVal) : new Date(),
    note: note,
    aiData: aiData || {},
    createdAt: new Date()
  };
  records.unshift(rec);
  aiData = {};
  toast('✅ 登録完了！');
  goDashboard();
}

// ===== INIT =====
renderDashboard();
</script>
