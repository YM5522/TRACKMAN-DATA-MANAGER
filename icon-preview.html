<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background: #1a1a2e; margin: 0; padding: 24px; font-family: 'Helvetica Neue', sans-serif; display: flex; flex-direction: column; align-items: center; }
p { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 24px; }
.icon { width: 180px; height: 180px; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); background: #0a1628; margin-bottom: 32px; }
.line-top { position: absolute; top: 14px; left: 18px; right: 18px; height: 3px; border-radius: 2px; background: linear-gradient(90deg, #00d4aa, #0066ff); opacity: 0.8; }
.line-bot { position: absolute; bottom: 14px; left: 18px; right: 18px; height: 2px; border-radius: 1px; background: linear-gradient(90deg, #00d4aa, #0066ff); opacity: 0.3; }
.tdm { font-size: 72px; font-weight: 900; font-family: 'Arial Black', 'Helvetica Neue', sans-serif; letter-spacing: -3px; line-height: 1; margin-bottom: 4px; background: linear-gradient(135deg, #00d4aa, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 10px; letter-spacing: 4px; font-weight: 600; color: rgba(255,255,255,0.22); }
.btn { background: linear-gradient(135deg, #00d4aa, #0066ff); border: none; color: #fff; font-size: 15px; font-weight: 700; padding: 14px 32px; border-radius: 12px; cursor: pointer; font-family: inherit; }
canvas { display: none; }
</style>
</head>
<body>
<p>PNGダウンロードボタンを押してください</p>
<div class="icon">
  <div class="line-top"></div>
  <div class="tdm">TDM</div>
  <div class="sub">TRACKMAN</div>
  <div class="line-bot"></div>
</div>
<button class="btn" onclick="downloadPNG()">📥 icon.png をダウンロード</button>
<canvas id="c" width="512" height="512"></canvas>
<script>
function downloadPNG() {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W=512, H=512, R=115;
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  ctx.moveTo(R,0); ctx.lineTo(W-R,0);
  ctx.arcTo(W,0,W,R,R); ctx.lineTo(W,H-R);
  ctx.arcTo(W,H,W-R,H,R); ctx.lineTo(R,H);
  ctx.arcTo(0,H,0,H-R,R); ctx.lineTo(0,R);
  ctx.arcTo(0,0,R,0,R); ctx.closePath();
  ctx.fillStyle='#0a1628'; ctx.fill();
  ctx.save(); ctx.clip();

  // 上ライン
  var g1=ctx.createLinearGradient(50,0,462,0);
  g1.addColorStop(0,'rgba(0,212,170,0.8)'); g1.addColorStop(1,'rgba(0,102,255,0.8)');
  ctx.fillStyle=g1; ctx.fillRect(50,62,412,5);

  // TDM グラデーション
  var g2=ctx.createLinearGradient(60,0,450,0);
  g2.addColorStop(0,'#00d4aa'); g2.addColorStop(1,'#0066ff');
  ctx.font='900 210px "Arial Black","Helvetica Neue",Arial,sans-serif';
  ctx.fillStyle=g2;
  ctx.textAlign='center';
  ctx.fillText('TDM',256,340);

  // 下ライン
  var g3=ctx.createLinearGradient(50,0,462,0);
  g3.addColorStop(0,'rgba(0,212,170,0.3)'); g3.addColorStop(1,'rgba(0,102,255,0.3)');
  ctx.fillStyle=g3; ctx.fillRect(50,388,412,2);

  // TRACKMAN
  ctx.font='600 32px "Helvetica Neue",Arial,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.textAlign='center';
  ctx.fillText('TRACKMAN',256,442);

  ctx.restore();
  var a=document.createElement('a'); a.download='icon.png';
  a.href=canvas.toDataURL('image/png'); a.click();
}
</script>
</body>
</html>
